    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {

        .container {

        h1 {

        }
        .subtitle { color: #888; margin-bottom: 2rem; }
        .stats {

            margin-bottom: 2rem;
        }
        .stat {
            background: rgba(255,255,255,0.1);
            padding: 0.5rem 1.5rem;
            border-radius: 20px;
        }
        .puzzle-grid {
            display: inline-grid;
            gap: 8px;
            background: rgba(0,0,0,0.3);
            padding: 16px;
            border-radius: 16px;
            margin-bottom: 2rem;
        }
        .tile {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #9C27B0, #E91E63);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.15s, opacity 0.15s;
            user-select: none;
        }
        .tile:hover { transform: scale(1.05); }
        .tile.empty {
            background: rgba(255,255,255,0.05);
            cursor: default;
        }
        .tile.empty:hover { transform: none; }
        .actions {
            display: flex;
            justify-content: center;
            gap: 1rem;
        }
        .btn {
            padding: 0.75rem 2rem;
            font-size: 1rem;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #9C27B0, #E91E63);
            color: #fff;
        }
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }
        .btn:hover { transform: scale(1.05); }
        .message {
            margin-top: 1.5rem;
            padding: 1rem;
            color: #888;
            font-size: 1.1rem;
        }
        .win-message {
            color: #4CAF50;
            font-size: 1.5rem;

            color: white;

<body>
    <a href="#" onclick="showPremium(event)" class="premium-float">Upgrade to Premium</a>
    
    <div class="premium-modal" id="premium-modal" style="display:none;">
        <div class="premium-content">
            <span onclick="closePremium()" class="close">&times;</span>
            <h2>Upgrade to Premium</h2>
            <p>Unlock all features!</p>
            <ul>
                <li>Unlimited Puzzles</li>
                <li>More Difficulty Levels</li>
                <li>No Ads</li>
                <li>Custom Images</li>
            </ul>
            <p class="price">$4.99/month</p>
            <button onclick="buyPremium()" class="btn btn-primary">Subscribe Now</button>
        </div>
    </div>

    <div class="container">
        <h1>Butts Puzzle</h1>
        <p class="subtitle">Sliding tile puzzle - arrange numbers in order</p>
        
        <div class="stats">
            <div class="stat">Moves: <span id="moves">0</span></div>
            <div class="stat">Time: <span id="time">0:00</span></div>
            <div class="stat">Best: <span id="best">-</span></div>
        </div>
        
        <div class="difficulty">
            <button class="active" onclick="setDifficulty(3)">3x3</button>
            <button onclick="setDifficulty(4)">4x4</button>
            <button onclick="setDifficulty(5)">5x5</button>
        </div>
        
        <div class="puzzle-grid" id="puzzle"></div>
        
        <div class="actions">
            <button class="btn btn-primary" onclick="shuffle()">New Game</button>
            <button class="btn btn-secondary" onclick="solve()">Show Solution</button>
        </div>
        
        <div class="message" id="message">Click a tile next to the empty space to move it</div>
    </div>

    <script>
        let gridSize = 3;
        let tiles = [];
        let emptyIndex = 0;
        let moves = 0;
        let startTime = null;
        let timerInterval = null;
        let bestTimes = { 3: null, 4: null, 5: null };
        
        function setDifficulty(size) {
            gridSize = size;
            document.querySelectorAll('.difficulty button').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            initGame();
        }
        
        function initGame() {
            tiles = Array.from({ length: gridSize * gridSize }, (_, i) => i);
            emptyIndex = gridSize * gridSize - 1;
            moves = 0;
            document.getElementById('moves').textContent = '0';
            document.getElementById('message').textContent = 'Click a tile next to the empty space to move it';
            document.getElementById('message').className = 'message';
            
            if (timerInterval) clearInterval(timerInterval);
            document.getElementById('time').textContent = '0:00';
            startTime = null;
            
            const best = bestTimes[gridSize];
            document.getElementById('best').textContent = best ? formatTime(best) : '-';
            
            shuffle();
        }
        
        function shuffle() {
            // Perform random valid moves to ensure solvability
            for (let i = 0; i < gridSize * 100; i++) {
                const neighbors = getNeighbors(emptyIndex);
                const randomNeighbor = neighbors[Math.floor(Math.random() * neighbors.length)];
                [tiles[emptyIndex], tiles[randomNeighbor]] = [tiles[randomNeighbor], tiles[emptyIndex]];
                emptyIndex = randomNeighbor;
            }
            moves = 0;
            startTime = null;
            if (timerInterval) clearInterval(timerInterval);
            document.getElementById('moves').textContent = '0';
            document.getElementById('time').textContent = '0:00';
            document.getElementById('message').textContent = 'Click a tile next to the empty space to move it';
            document.getElementById('message').className = 'message';
            render();
        }
        
        function getNeighbors(index) {
            const neighbors = [];
            const row = Math.floor(index / gridSize);
            const col = index % gridSize;
            
            if (row > 0) neighbors.push(index - gridSize);
            if (row < gridSize - 1) neighbors.push(index + gridSize);
            if (col > 0) neighbors.push(index - 1);
            if (col < gridSize - 1) neighbors.push(index + 1);
            
            return neighbors;
        }
        
        function moveTile(index) {
            if (!getNeighbors(emptyIndex).includes(index)) return;
            
            if (!startTime) {
                startTime = Date.now();
                timerInterval = setInterval(updateTimer, 1000);
            }
            
            [tiles[emptyIndex], tiles[index]] = [tiles[index], tiles[emptyIndex]];
            emptyIndex = index;
            moves++;
            document.getElementById('moves').textContent = moves;
            
            render();
            checkWin();
        }
        
        function updateTimer() {
            if (!startTime) return;
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            document.getElementById('time').textContent = formatTime(elapsed);
        }
        
        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }
        
        function checkWin() {
            const isWin = tiles.every((tile, i) => tile === i);
            if (isWin) {
                clearInterval(timerInterval);
                const elapsed = Math.floor((Date.now() - startTime) / 1000);
                
                if (!bestTimes[gridSize] || elapsed < bestTimes[gridSize]) {
                    bestTimes[gridSize] = elapsed;
                    document.getElementById('best').textContent = formatTime(elapsed);
                }
                
                document.getElementById('message').textContent = `Congratulations! Solved in ${moves} moves and ${formatTime(elapsed)}!`;
                document.getElementById('message').className = 'message win-message';
            }
        }
        
        function solve() {
            tiles = Array.from({ length: gridSize * gridSize }, (_, i) => i);
            emptyIndex = gridSize * gridSize - 1;
            document.getElementById('message').textContent = 'Puzzle solved! Click "New Game" to play again.';
            render();
        }
        
        function render() {
            const puzzle = document.getElementById('puzzle');
            puzzle.style.gridTemplateColumns = `repeat(${gridSize}, 80px)`;
            
            puzzle.innerHTML = tiles.map((tile, index) => {
                if (tile === gridSize * gridSize - 1) {
                    return `<div class="tile empty"></div>`;
                }
                return `<div class="tile" onclick="moveTile(${index})">${tile + 1}</div>`;
            }).join('');
        }
        
        // Initialize
        initGame();
        
        // Premium functions
        function showPremium(e) {
            if(e) e.preventDefault();
            document.getElementById('premium-modal').style.display = 'flex';
        }
        function closePremium() {
            document.getElementById('premium-modal').style.display = 'none';
        }
    </script>
