<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1200px;
      height: 630px;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 60px;
    }
    .puzzle-grid {
      display: grid;
      grid-template-columns: repeat(4, 60px);
      grid-template-rows: repeat(4, 60px);
      gap: 8px;
      margin-bottom: 40px;
    }
    .puzzle-piece {
      background: #9C27B0;
      border-radius: 8px;
    }
    .puzzle-piece:nth-child(odd) { background: #E91E63; }
    .puzzle-piece:nth-child(3n) { background: #9C27B0; opacity: 0.6; }
    .puzzle-piece:nth-child(2n) { opacity: 0.8; }
    h1 {
      font-size: 52px;
      font-weight: 700;
      color: white;
      text-align: center;
      margin-bottom: 16px;
    }
    h1 em { color: #9C27B0; font-style: normal; }
    p {
      font-size: 20px;
      color: #888;
      text-align: center;
    }
    .badge {
      position: absolute;
      bottom: 40px;
      right: 60px;
      font-size: 14px;
      color: #555;
      font-family: 'Courier New', monospace;
    }
  </style>
</head>
<body>
  <div class="puzzle-grid">
    <div class="puzzle-piece"></div>
    <div class="puzzle-piece"></div>
    <div class="puzzle-piece"></div>
    <div class="puzzle-piece"></div>
    <div class="puzzle-piece"></div>
    <div class="puzzle-piece"></div>
    <div class="puzzle-piece"></div>
    <div class="puzzle-piece"></div>
    <div class="puzzle-piece"></div>
    <div class="puzzle-piece"></div>
    <div class="puzzle-piece"></div>
    <div class="puzzle-piece"></div>
    <div class="puzzle-piece"></div>
    <div class="puzzle-piece"></div>
    <div class="puzzle-piece"></div>
    <div class="puzzle-piece"></div>
  </div>
  <h1>Mind-Bending <em>Puzzles</em></h1>
  <p>Challenge your logic and problem-solving skills</p>
  <div class="badge">puzzle.buttsstudios.com</div>
</body>
</html>
